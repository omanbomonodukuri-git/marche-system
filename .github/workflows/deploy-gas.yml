# ============================================================
#  GAS 自動プッシュ ワークフロー
#
#  src/gas_code.gs が変更されて main にプッシュされると
#  Google Apps Script エディタのコードを自動更新します。
#  ※ デプロイ（公開バージョン更新）は手動で行ってください。
#
#  【初回セットアップ必須】
#  GitHub リポジトリの Settings → Secrets → Actions に
#  以下の2つを登録してください:
#
#    CLASP_CREDENTIALS  : ~/.clasprc.json の内容（JSON文字列）
#    GAS_SCRIPT_ID      : Apps Script エディタの「プロジェクトの設定」のスクリプトID
#
#  ※ CLASP_CREDENTIALS の取得方法は SETUP.md を参照
# ============================================================

name: Push GAS code

on:
  push:
    branches: [main]
    paths:
      - 'src/gas_code.gs'

jobs:
  push-gas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Prepare GAS project
        run: |
          mkdir -p gas
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > gas/.clasp.json
          cp src/gas_code.gs gas/Code.gs

      - name: Push to GAS editor
        working-directory: gas
        run: clasp push --force

      - name: Done
        run: |
          echo "✅ GASエディタのコードを更新しました"
          echo "   Apps Scriptエディタで確認後、「デプロイ」→「新しいバージョンでデプロイ」を実行してください"
